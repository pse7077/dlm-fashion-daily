name: Update Fashion Daily

on:
  schedule:
    # GitHub Actions cron uses UTC. 22:10 UTC Sunday-Thursday = 07:10 KST Monday-Friday.
    # Starting earlier gives the workflow more buffer when GitHub Actions queues are delayed.
    - cron: "10 22 * * 0-4"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional KST date to regenerate, e.g. 2026-06-18"
        required: false
        type: string

permissions:
  contents: write
  models: read

concurrency:
  group: fashion-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Generate today's briefing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4.1-mini
          TARGET_DATE: ${{ inputs.target_date }}
        run: node scripts/update-daily.mjs

      - name: Commit archive update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4.1-mini
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          echo "DLM workflow v13: scheduled at 07:10 KST with push conflict defense"
          target_date="${TARGET_DATE:-$(TZ=Asia/Seoul date +%F)}"
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          commit_and_push() {
            git add -A
            if git diff --cached --quiet; then
              echo "No changes to commit."
              return 0
            fi
            git commit -m "Update Fashion Daily for ${target_date}"
            git push origin HEAD:main
          }

          if commit_and_push; then
            exit 0
          fi

          echo "Initial push was rejected. Syncing latest main and regenerating once."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

          node scripts/update-daily.mjs

          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes after syncing latest main."
            exit 0
          fi

          commit_and_push
