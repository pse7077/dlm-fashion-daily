name: Update Fashion Daily

on:
  schedule:
    # GitHub Actions cron uses UTC. 22:50 UTC Sunday-Thursday = 07:50 KST Monday-Friday.
    # Using :50 avoids the heavier top-of-hour queue, so the site should update closer to the intended morning time.
    - cron: "50 22 * * 0-4"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional KST date to regenerate, e.g. 2026-06-18"
        required: false
        type: string

permissions:
  contents: write
  models: read

concurrency:
  group: fashion-daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Generate today's briefing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODEL: openai/gpt-4.1-mini
          TARGET_DATE: ${{ inputs.target_date }}
        run: node scripts/update-daily.mjs

      - name: Commit archive update
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          echo "DLM workflow v11: scheduled at 07:50 KST"
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit after syncing."
            exit 0
          fi
          git commit -m "Update Fashion Daily for ${TARGET_DATE:-$(TZ=Asia/Seoul date +%F)}"
          git push
